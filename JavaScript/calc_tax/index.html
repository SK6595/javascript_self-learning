<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>消費税の計算</title>
  </head>
  <body>
    <p>
      <script>
        let price = 120; // 変数を使いたい時には、使う場所よりも前で宣言する。
        const tax = 1.1;
        document.write(price + '円の税込金額は、'); // 文字列を表示する場合はクォーテーション記号を使う。

        price = 1000;
        tax = 1.5;
        // 税込金額の計算結果を表示する
        document.write(price * tax + '円です');
      </script>
    </p>
  </body>
</html>
